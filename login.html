<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    
  <div class="con">
    <div class="card">
        <div class="inner-box" id="card">
            <div class="card-front">
                <h2>LOGIN</h2>
                <form action="">
                    <input type="email" name="email" class="input-box" placeholder="Your Email ID" required>
                    <input type="password" name="password" class="input-box" placeholder="Password" required>
                   <button type="submit" class="submit-btn" target="index.html" >Submit and goto website</button>
                   <input type="checkbox"><span>Remember Me</span>
                </form>
                <button type="button" class="btn" onclick="openRegister()">I'm New Here</button>
                <a href="">Forgot Password?</a>
            </div>
            <div class="card-back">
                <h2>REGISTER</h2>
                <form action="">
                    <input type="text" name="email" class="input-box" placeholder="Your Name" required>
                    <input type="email" name="email" class="input-box" placeholder="Your Email ID" required>
                    <input type="password" name="password" class="input-box" placeholder="Password" required>
                   <button type="submit" class="submit-btn" onclick="index.html">Submit</button>
                   
                   <input type="checkbox"><span>Remember Me</span>
                </form>
                <button type="button" class="btn" onclick="openLogin()">I've an Account</button>
                <a href="">Forgot Password?</a>
            </div>
        </div>
    </div>
  </div>
</body>
<script>
    var card=document.getElementById("card");
    function openRegister(){
        card.style.transform="rotateY(-180deg)";
        
    }
    function openLogin(){
        card.style.transform="rotateY(0deg)";
    }
    // function myFunction(){
    //     window.location.href="portfolio.html";
    // }

</script>
</html>
